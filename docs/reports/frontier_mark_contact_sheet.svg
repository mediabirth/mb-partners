<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" fill="none">
  <rect width="760" height="360" fill="#FFFFFF"/>
  <text x="32" y="40" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="800" fill="#0E0E14">Frontier ダッシュボード — フラット抽象マーク候補（単色 #4733E6 / 2×2グリッドの世界観）</text>
  <text x="32" y="62" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#6E707D">絵文字 👑 / 🏅 を撤去。app/icon.svg と同じ藍・幾何・フラット。差替可。</text>

  <!-- A: Hub (APPLIED) -->
  <g transform="translate(60,110)">
    <rect x="-26" y="-26" width="148" height="170" rx="16" fill="#F7F6FE" stroke="#4733E6" stroke-width="1.5"/>
    <g transform="translate(24,18) scale(2)">
      <rect x="19" y="19" width="10" height="10" rx="3" fill="#4733E6"/>
      <rect x="6"  y="6"  width="8" height="8" rx="2.5" stroke="#4733E6" stroke-width="2.4"/>
      <rect x="34" y="6"  width="8" height="8" rx="2.5" stroke="#4733E6" stroke-width="2.4"/>
      <rect x="6"  y="34" width="8" height="8" rx="2.5" stroke="#4733E6" stroke-width="2.4"/>
      <rect x="34" y="34" width="8" height="8" rx="2.5" stroke="#4733E6" stroke-width="2.4"/>
    </g>
    <text x="48" y="132" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800" fill="#4733E6">A. Hub ★採用</text>
    <text x="48" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#6E707D">統括＝中心＋チーム</text>
  </g>

  <!-- B: Apex -->
  <g transform="translate(280,110)">
    <rect x="-26" y="-26" width="148" height="170" rx="16" fill="#FFFFFF" stroke="#ECECF1" stroke-width="1.5"/>
    <g transform="translate(24,18) scale(2)">
      <rect x="8"  y="3"  width="14" height="14" rx="4" fill="#4733E6"/>
      <rect x="26" y="9"  width="14" height="14" rx="7" stroke="#4733E6" stroke-width="3"/>
      <rect x="8"  y="27" width="14" height="14" rx="7" stroke="#4733E6" stroke-width="3"/>
      <rect x="26" y="27" width="14" height="14" rx="4" stroke="#4733E6" stroke-width="3"/>
    </g>
    <text x="48" y="132" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800" fill="#0E0E14">B. Apex</text>
    <text x="48" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#6E707D">先頭の升を上に昇格</text>
  </g>

  <!-- C: Ascend -->
  <g transform="translate(500,110)">
    <rect x="-26" y="-26" width="148" height="170" rx="16" fill="#FFFFFF" stroke="#ECECF1" stroke-width="1.5"/>
    <g transform="translate(24,18) scale(2)">
      <rect x="6"   y="26" width="9" height="16" rx="2.5" stroke="#4733E6" stroke-width="2.6"/>
      <rect x="19.5" y="18" width="9" height="24" rx="2.5" stroke="#4733E6" stroke-width="2.6"/>
      <rect x="33"  y="10" width="9" height="32" rx="2.5" fill="#4733E6"/>
    </g>
    <text x="48" y="132" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800" fill="#0E0E14">C. Ascend</text>
    <text x="48" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#6E707D">上昇する3本バー</text>
  </g>

  <!-- MVP spark -->
  <g transform="translate(648,110)">
    <rect x="-14" y="-26" width="92" height="170" rx="16" fill="#F7F6FE" stroke="#4733E6" stroke-width="1.5"/>
    <g transform="translate(8,24) scale(2)">
      <path d="M12 2 L14.6 9.4 L22 12 L14.6 14.6 L12 22 L9.4 14.6 L2 12 L9.4 9.4 Z" fill="#4733E6"/>
    </g>
    <text x="32" y="132" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800" fill="#4733E6">MVP ★採用</text>
    <text x="32" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10.5" fill="#6E707D">4点スパーク</text>
  </g>
</svg>
